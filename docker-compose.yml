services:
  postgres:
    image: postgres:16-alpine
    container_name: claimdesk-postgres
    environment:
      POSTGRES_DB: claimdesk
      POSTGRES_USER: claimdesk
      POSTGRES_PASSWORD: claimdesk
    ports:
      - "5432:5432"
    volumes:
      - claimdesk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimdesk -d claimdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: claimdesk-redis
    ports:
      - "6379:6379"

volumes:
  claimdesk-postgres-data:
