spring:
  application:
    name: claimdesk-api
  profiles:
    default: local

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origin: http://localhost:5173
  security:
    jwt:
      secret: ${JWT_SECRET:claimdesk-local-development-secret-key-must-be-at-least-256-bit}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:Lax}
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    receipts-dir: ${RECEIPTS_DIR:storage/receipts}
    max-receipt-size-bytes: ${MAX_RECEIPT_SIZE_BYTES:5242880}
    supabase:
      url: ${SUPABASE_URL:}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:receipts}
      signed-url-ttl-seconds: ${SUPABASE_SIGNED_URL_TTL_SECONDS:300}
